<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cartografía de la vergüenza</title>

  <link rel="stylesheet" href="./style.css" />

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
</head>

<body class="theme-light">
  <main id="app">
    <div id="map"></div>

    <div class="mode-switch" role="group" aria-label="Cambiar régimen de visibilidad">
      <button id="btn-contexto" class="mode-btn is-active" type="button">Contexto</button>
      <button id="btn-consecuencias" class="mode-btn" type="button">Consecuencias</button>
    </div>
  </main>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="./script.js"></script>
</body>
</html>
